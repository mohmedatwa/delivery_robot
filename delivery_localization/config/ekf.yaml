ekf_filter_node:
  ros__parameters:


    frequency: 20.0
    sensor_timeout: 0.2

    two_d_mode: true

    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true

   
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom


    odom0: mecanum_controller/odom

    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, true,
                   false, false, false]

    odom0_queue_size: 5
    odom0_differential: false
    odom0_relative: false

    imu0: imu/data

    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
